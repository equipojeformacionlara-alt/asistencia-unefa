<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Control Docente - UNEFA</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #f2a900; /* Color institucional dorado/amarillo */
            --bg: #f0f2f5;
            --white: #ffffff;
            --text: #333;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1000px; margin: auto; background: var(--white); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }

        /* Dashboard Controls */
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; background: #e9ecef; padding: 20px; border-radius: 10px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        select, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }

        /* Grid de Resultados */
        #resultadoContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }

        .card { background: white; border-top: 5px solid var(--primary); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.2em; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .info-item { margin-bottom: 8px; font-size: 0.9em; }
        .info-label { font-weight: bold; color: #666; width: 80px; display: inline-block; }
        
        .contact-box { background: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 0.85em; }
        .tag-carrera { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; }

        .asistio-btn { display: block; width: 100%; padding: 8px; margin-top: 15px; border: none; border-radius: 4px; background: #28a745; color: white; font-weight: bold; cursor: pointer; }
        
        .no-results { grid-column: 1 / -1; text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>Panel de Control Docente</h1>

    <div class="controls">

    </div>

    <div id="resultadoContainer">

</div>

    const cContainer = document.getElementById('resultadoContainer');
    const fCarrera = document.getElementById('filtroCarrera');
    const fDia = document.getElementById('filtroDia');
    const fCedula = document.getElementById('filtroCedula');

    function filtrar() {
        const carrera = fCarrera.value;
        const dia = fDia.value;
        const cedula = fCedula.value.toLowerCase();

        const resultados = docentes.filter(d => {
            return (carrera === "" || d.carrera === carrera) &&
                   (dia === "" || d.dia === dia) &&
                   (cedula === "" || d.cedula.includes(cedula) || d.nombre.toLowerCase().includes(cedula));
        });

        renderizar(resultados);
    }

    function renderizar(lista) {
        cContainer.innerHTML = "";
        if(lista.length === 0) {
            cContainer.innerHTML = `<div class="no-results">No se encontraron docentes con esos filtros.</div>`;
            return;
        }

        lista.forEach(d => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="tag-carrera">${d.carrera}</span>
                <h3>${d.nombre}</h3>
                <div class="info-item"><span class="info-label">Cédula:</span> ${d.cedula}</div>
                <div class="info-item"><span class="info-label">Sección:</span> ${d.SECCION}</div>
                <div class="info-item"><span class="info-label">Horario:</span> ${d.dia} / ${d.horario}</div>
                <div class="info-item"><span class="info-label">Aula:</span> ${d.aula}</div>
                
                <div class="contact-box">
                    <strong>Contacto:</strong><br>
                    📞 ${d.Telf}<br>
                    ✉️ ${d.Correo}
                </div>
                
                <button class="asistio-btn" onclick="alert('Asistencia marcada para ${d.nombre}')">MARCAR ASISTENCIA</button>
            `;
            cContainer.appendChild(card);
        });
    }

    // Eventos
    fCarrera.addEventListener('change', filtrar);
    fDia.addEventListener('change', filtrar);
    fCedula.addEventListener('input', filtrar);

    // Carga inicial
    filtrar();
</script>
